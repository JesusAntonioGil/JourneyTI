disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - empty_string
  - first_where

included:
  - JourneyTI/JourneyTI

excluded:
  - JourneyTI/JourneyTITests
  - JourneyTI/JourneyTIUITests
  - DerivedData

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800
