name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
        continue-on-error: true

      - name: Show Xcode version
        run: xcrun xcodebuild -version

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        id: brew-cache
        with:
          path: |
            /opt/homebrew/Cellar/swiftlint
            /opt/homebrew/Cellar/xcbeautify
            /opt/homebrew/bin/swiftlint
            /opt/homebrew/bin/xcbeautify
          key: ${{ runner.os }}-brew-swiftlint-xcbeautify-v1

      - name: Install SwiftLint and xcbeautify
        if: steps.brew-cache.outputs.cache-hit != 'true'
        run: brew install swiftlint xcbeautify

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project JourneyTI/JourneyTI.xcodeproj \
            -scheme JourneyTI \
            -destination 'platform=iOS Simulator,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            2>&1 | xcbeautify --renderer github-actions

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          xcode: true
          xcode_archive_path: TestResults.xcresult
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: TestResults.xcresult
